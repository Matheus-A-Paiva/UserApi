version: '3.9'

services:

  userdb:
    image: postgres:17
    container_name: userdb
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root123
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - user-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    container_name: user-api
    build: .
    ports:
      - "5050:8080"
    depends_on:
      userdb:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=userdb;Port=5432;Database=userdb;Username=postgres;Password=root123
      - Jwt__Key=super_secret_key_12345678901234567890
      - Jwt__Issuer=UserApi
      - Jwt__Audience=UserApiClients
    networks:
      - user-network

networks:
  user-network:

volumes:
  postgres_data: